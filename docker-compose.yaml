# MediaMTX for pseudo_camera
#
# Start this stack FIRST — it creates the shared "camera-net" network.
#
#   docker compose up -d
#
# Other stacks (HA, Frigate, Scrypted) join camera-net as an external network.
# See docker/README.md for snippets.

services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    restart: unless-stopped
    volumes:
      - ./docker/mediamtx.yml:/mediamtx.yml:ro
      - mediamtx-recordings:/recordings
    ports:
      # Host access for VLC / debugging. Containers on camera-net use hostname "mediamtx".
      - "8554:8554"   # RTSP
      - "1935:1935"   # RTMP (more reliable ffmpeg publish)
      - "8888:8888"   # HLS
      - "8889:8889"   # WebRTC HTTP
    networks:
      - camera-net
    # The default image is minimal (no wget/curl) and the API is disabled by
    # default, so HTTP-based healthchecks always fail. RTSP on :8554 is the
    # real liveness signal — verify with: nc -zv 127.0.0.1 8554

networks:
  camera-net:
    name: camera-net
    driver: bridge

volumes:
  mediamtx-recordings:

# MediaMTX for pseudo_camera
#
# Start this stack FIRST — it creates the shared "camera-net" network.
#
#   docker compose up -d --build
#
# Other stacks (HA, Frigate, Scrypted) join camera-net as an external network.
# See docker/README.md for snippets.

services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    restart: unless-stopped
    volumes:
      - ./docker/mediamtx.yml:/mediamtx.yml:ro
      - mediamtx-recordings:/recordings
    ports:
      # Host access for VLC / debugging. Containers on camera-net use hostname "mediamtx".
      - "8554:8554"   # RTSP
      - "1935:1935"   # RTMP (more reliable ffmpeg publish)
      - "8888:8888"   # HLS
      - "8889:8889"   # WebRTC HTTP
    networks:
      - camera-net

  # Publishes gray fallback when MediaMTX reports no RTMP publisher on a path.
  # HA pseudo/relay takes over automatically when it connects.
  mtx-keepalive:
    build:
      context: ./docker
      dockerfile: Dockerfile.keepalive
    container_name: mtx-keepalive
    restart: unless-stopped
    depends_on:
      - mediamtx
    networks:
      - camera-net
    environment:
      KEEPALIVE_PATHS: stairs_over_door
      MEDIAMTX_API: http://mediamtx:9997

networks:
  camera-net:
    name: camera-net
    driver: bridge

volumes:
  mediamtx-recordings:

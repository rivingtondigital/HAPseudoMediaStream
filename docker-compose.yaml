# MediaMTX for pseudo_camera
#
#   docker compose up -d --build
#
# Logs on host:
#   ./logs/mediamtx.log      (MediaMTX file log)
#   docker logs mediamtx     (stdout)

services:
  logs-init:
    image: alpine:3.20
    container_name: mtx-logs-init
    volumes:
      - ./logs:/logs
    entrypoint: ["/bin/sh", "-c"]
    command:
      - mkdir -p /logs && touch /logs/mediamtx.log && chmod -R a+rwX /logs
    restart: "no"

  offline-init:
    image: alpine:3.20
    container_name: mtx-offline-init
    volumes:
      - ./docker/offline:/offline
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        if [ ! -f /offline/gray_720p.mp4 ]; then
          apk add --no-cache ffmpeg >/dev/null
          ffmpeg -hide_banner -loglevel error -y \
            -f lavfi -i color=c=gray:s=1280x720:r=10 \
            -frames:v 20 -an -c:v libx264 -pix_fmt yuv420p -profile:v baseline \
            -preset ultrafast -tune stillimage -bf 0 -g 10 -r 10 \
            /offline/gray_720p.mp4
        fi
    restart: "no"

  mediamtx:
    image: bluenviron/mediamtx:1.19.2
    container_name: mediamtx
    restart: unless-stopped
    depends_on:
      logs-init:
        condition: service_completed_successfully
      offline-init:
        condition: service_completed_successfully
    volumes:
      - ./docker/mediamtx.yml:/mediamtx.yml:ro
      - ./docker/offline:/offline:ro
      - mediamtx-recordings:/recordings
      - ./logs:/logs
    ports:
      - "8554:8554"   # RTSP
      - "1935:1935"   # RTMP
      - "8888:8888"   # HLS
      - "8889:8889"   # WebRTC HTTP
      - "9997:9997"   # API (debugging)
    networks:
      - camera-net

networks:
  camera-net:
    name: camera-net
    driver: bridge

volumes:
  mediamtx-recordings:

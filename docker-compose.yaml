# MediaMTX for pseudo_camera
#
#   docker compose up -d --build
#
# Logs on host:
#   ./logs/mediamtx.log      (MediaMTX file log)
#   ./logs/keepalive.log     (fallback publisher)
#   docker logs mediamtx     (stdout, always available)

services:
  logs-init:
    image: alpine:3.20
    container_name: mtx-logs-init
    volumes:
      - ./logs:/logs
    entrypoint: ["/bin/sh", "-c"]
    command:
      - mkdir -p /logs && touch /logs/mediamtx.log /logs/keepalive.log && chmod -R a+rwX /logs
    restart: "no"

  mediamtx:
    image: bluenviron/mediamtx:1.19.2
    container_name: mediamtx
    restart: unless-stopped
    depends_on:
      logs-init:
        condition: service_completed_successfully
    volumes:
      - ./docker/mediamtx.yml:/mediamtx.yml:ro
      - mediamtx-recordings:/recordings
      - ./logs:/logs
    ports:
      - "8554:8554"   # RTSP
      - "1935:1935"   # RTMP
      - "8888:8888"   # HLS
      - "8889:8889"   # WebRTC HTTP
      - "9997:9997"   # API (debugging)
    networks:
      - camera-net

  mtx-keepalive:
    build:
      context: ./docker
      dockerfile: Dockerfile.keepalive
    container_name: mtx-keepalive
    restart: unless-stopped
    depends_on:
      logs-init:
        condition: service_completed_successfully
      mediamtx:
        condition: service_started
    networks:
      - camera-net
    environment:
      KEEPALIVE_PATHS: stairs_over_door
      MEDIAMTX_API: http://mediamtx:9997
      LOG_DIR: /logs
    volumes:
      - ./logs:/logs
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://mediamtx:9997/v3/config/global/get"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  camera-net:
    name: camera-net
    driver: bridge

volumes:
  mediamtx-recordings:

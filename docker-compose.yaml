# MediaMTX for pseudo_camera
#
#   docker compose up -d
#
# Logs on host:
#   ./logs/mediamtx.log      (MediaMTX file log)
#   docker logs mediamtx     (stdout)

services:
  logs-init:
    image: alpine:3.20
    container_name: mtx-logs-init
    volumes:
      - ./logs:/logs
    entrypoint: ["/bin/sh", "-c"]
    command:
      - mkdir -p /logs && touch /logs/mediamtx.log && chmod -R a+rwX /logs
    restart: "no"

  mediamtx:
    image: bluenviron/mediamtx:1.19.2
    container_name: mediamtx
    restart: unless-stopped
    depends_on:
      logs-init:
        condition: service_completed_successfully
    volumes:
      - ./docker/mediamtx.yml:/mediamtx.yml:ro
      - mediamtx-recordings:/recordings
      - ./logs:/logs
    ports:
      - "8554:8554"   # RTSP
      - "1935:1935"   # RTMP
      - "8888:8888"   # HLS
      - "8889:8889"   # WebRTC HTTP
      - "9997:9997"   # API (debugging)
    networks:
      - camera-net

networks:
  camera-net:
    name: camera-net
    driver: bridge

volumes:
  mediamtx-recordings:

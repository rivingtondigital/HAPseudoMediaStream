# MediaMTX config for pseudo_camera (auth revision: open-local-stack)
#
# HA is the sole RTMP publisher (pseudo/relay). alwaysAvailable keeps Frigate's
# reader session alive across brief publisher gaps; overridePublisher enables
# make-before-break handoffs between HA publishers.
#
# alwaysAvailable is only valid on concrete path names — never pathDefaults,
# all, all_others, or regex paths.

logLevel: info
logDestinations: [stdout, file]
logFile: /logs/mediamtx.log

authMethod: internal

# Replace defaults entirely. Host curl reaches the API via Docker bridge IPs
# (172.x), not 127.0.0.1 inside the container.
authInternalUsers:
  - user: any
    pass: ""
    ips: []
    permissions:
      - action: publish
      - action: read
      - action: playback
      - action: api
      - action: metrics

api: yes
apiAddress: :9997

pathDefaults:
  overridePublisher: true
  source: publisher

paths:
  stairs_over_door:
    alwaysAvailable: true
    alwaysAvailableTracks:
      - codec: H264
